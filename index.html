<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam P 題庫練習系統</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f4e8, #cae8d5 52%, #98c1d9);
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            color: #1f2a2e;
            text-align: center;
        }

        main {
            width: min(840px, calc(100vw - 28px));
            margin: 20px auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, .18);
        }

        h1 {
            color: #235347;
            font-size: 34px;
            margin: 0 0 16px;
        }

        button {
            background: #f4c430;
            border: 0;
            border-radius: 8px;
            padding: 11px 18px;
            margin: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #e7b820;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .55;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 0 0 16px;
        }

        .stats p {
            margin: 0;
            padding: 8px 12px;
            background: #eef7f1;
            border-radius: 8px;
        }

        #questionText {
            background: #eef7f1;
            padding: 18px;
            border-radius: 8px;
            font-size: 17px;
            line-height: 1.55;
            text-align: left;
            min-height: 58px;
            white-space: pre-wrap;
        }

        #options {
            text-align: left;
            display: inline-block;
            font-size: 17px;
            line-height: 1.9;
            min-width: min(520px, 100%);
        }

        #options label {
            display: block;
            margin: 4px 0;
        }

        #result {
            min-height: 60px;
            line-height: 1.55;
        }

        .answer-summary {
            margin-bottom: 18px;
            font-size: 20px;
            font-weight: 700;
        }

        .correct {
            color: #218739;
        }

        .wrong {
            color: #c92a2a;
        }

        .explanation-box {
            max-width: 100%;
            margin: 14px auto;
            padding: 16px 18px;
            border-radius: 8px;
            text-align: left;
        }

        .plain-explanation {
            background: #fff8d8;
            border-left: 6px solid #f4c430;
        }

        .official-explanation {
            background: #f4f6f6;
            border-left: 6px solid #6aa84f;
        }

        canvas {
            width: min(400px, 100%);
            aspect-ratio: 1;
            border: 8px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .28);
            background: #86d96a;
        }

        .game-status {
            margin: 8px 0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main id="studyPage">
        <h1>Exam P 題庫練習系統</h1>

        <div class="stats">
            <p>已答題數：<span id="doneCount">0</span></p>
            <p>答對題數：<span id="correctCount">0</span></p>
            <p>答錯題數：<span id="wrongCount">0</span></p>
            <p>正確率：<span id="accuracyText">0%</span></p>
        </div>

        <button type="button" id="nextQuestionButton">抽一題</button>
        <button type="button" id="checkAnswerButton">檢查答案</button>
        <button type="button" id="showGameButton">休息玩 Snake Game</button>

        <h2 id="questionTitle">請先抽一題開始練習</h2>
        <div id="questionText"></div>
        <div id="options"></div>
        <div id="result"></div>
    </main>

    <main id="gamePage" style="display:none;">
        <h1>Snake Game</h1>

        <button type="button" id="classicButton">一般模式</button>
        <button type="button" id="battleButton">對戰模式</button>
        <button type="button" id="backToStudyButton">回到題庫</button>

        <p id="modeText" class="game-status">請選擇遊戲模式</p>
        <p id="timerText" class="game-status">休息時間：10:00</p>
        <canvas id="game" width="400" height="400"></canvas>
    </main>

    <script src="/script.js"></script>
</body>
</html>
