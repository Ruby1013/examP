<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam P &#32244;&#32722;&#20013;&#24515;</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff7c2, #b8f7a1);
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            color: #223322;
            text-align: center;
        }

        h1 {
            color: #2e7d32;
            font-size: 36px;
            margin: 0 0 16px;
        }

        #studyPage,
        #gamePage {
            width: min(720px, calc(100vw - 28px));
            margin: 20px auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, .18);
        }

        button {
            background: #ffcc00;
            border: 0;
            border-radius: 8px;
            padding: 11px 18px;
            margin: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #f6bd00;
        }

        .game-status {
            margin: 8px 0;
            font-weight: 700;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin: 0 0 16px;
        }

        .stats p {
            margin: 0;
            padding: 8px 12px;
            background: #f1ffe8;
            border-radius: 8px;
        }

        #questionText {
            background: #f1ffe8;
            padding: 18px;
            border-radius: 8px;
            font-size: 17px;
            line-height: 1.55;
            text-align: left;
            min-height: 58px;
        }

        #questionText p {
            margin: 0 0 12px;
        }

        #questionText p:last-child {
            margin-bottom: 0;
        }

        #options {
            text-align: left;
            display: inline-block;
            font-size: 17px;
            line-height: 1.9;
            min-width: min(420px, 100%);
        }

        #result {
            min-height: 60px;
            line-height: 1.55;
        }

        .answer-summary {
            margin-bottom: 18px;
        }

        .explanation-box {
            max-width: 100%;
            margin: 14px auto;
            padding: 16px 18px;
            border-radius: 8px;
            text-align: left;
        }

        .plain-explanation {
            background: #fff8d8;
            border-left: 6px solid #ffcc00;
        }

        .official-explanation {
            background: #f7f7f7;
            border-left: 6px solid #9ccc65;
        }

        .explanation-box h3 {
            margin: 0 0 10px;
            font-size: 19px;
        }

        .explanation-box p {
            margin: 0 0 10px;
        }

        .explanation-box p:last-child {
            margin-bottom: 0;
        }

        canvas {
            width: min(400px, 100%);
            aspect-ratio: 1;
            border: 8px solid #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .28);
            background: #86d96a;
        }
    </style>
</head>
<body>
    <main id="studyPage">
        <h1>&#128218; Exam P &#32244;&#32722;&#20013;&#24515;</h1>

        <div class="stats">
            <p>&#23436;&#25104;&#38988;&#25976;&#65306;<span id="doneCount">0</span></p>
            <p>&#27491;&#30906;&#38988;&#25976;&#65306;<span id="correctCount">0</span></p>
            <p>&#31572;&#37679;&#38988;&#25976;&#65306;<span id="wrongCount">0</span></p>
            <p>&#27491;&#30906;&#29575;&#65306;<span id="accuracyText">0%</span></p>
        </div>

        <button type="button" id="nextQuestionButton">&#10145;&#65039; &#19979;&#19968;&#38988;</button>
        <button type="button" id="checkAnswerButton">&#25552;&#20132;&#31572;&#26696;</button>
        <button type="button" id="showGameButton">&#20241;&#24687;&#19968;&#19979;&#29609;&#34503;&#34503; &#128013;</button>

        <h2 id="questionTitle">&#128218; &#40670;&#25802;&#12300;&#19979;&#19968;&#38988;&#12301;&#38283;&#22987;&#21047; Exam P</h2>
        <div id="questionText"></div>
        <div id="options"></div>
        <div id="result"></div>
    </main>

    <main id="gamePage" style="display:none;">
        <h1>&#128013; SnaleGame &#128013;</h1>

        <button type="button" id="classicButton">&#20659;&#32113;&#36010;&#21507;&#34503;</button>
        <button type="button" id="battleButton">&#34503;&#34503;&#22823;&#20316;&#25136;</button>
        <button type="button" id="backToStudyButton">&#22238;&#21435;&#21047;&#38988; &#128218;</button>

        <p id="modeText" class="game-status">&#35531;&#36984;&#25799;&#27169;&#24335;</p>
        <p id="timerText" class="game-status">&#20241;&#24687;&#21097;&#39192; 10:00</p>
        <canvas id="game" width="400" height="400"></canvas>
    </main>

    <script src="questionBank.js"></script>
    <script src="script.js"></script>
</body>
</html>
