services:
  - type: web
    name: exam-p-study-game
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exam-p-postgres
          property: connectionString

databases:
  - name: exam-p-postgres
    plan: free
