name: Diagnose SOA sync

on:
  push:
    branches:
      - codex/harden-official-soa-crawler
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/diagnose_solution_headings.py

